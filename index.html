const BRIEFS = [
            {date:"2026-03-13",items:[{"id":"20260313-1","category":"must","title":"Gemini Embedding 2: Our first natively multimodal embedding model","why":"多模态 builder 真正该盯的不是再堆一个 chat UI，而是把 text/image/video/audio/PDF 收进同一 embedding space——RAG、search、recommendation 的系统复杂度会直接下降。","url":"https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-embedding-2/"},{"id":"20260313-2","category":"must","title":"The era of "AI as text" is over. Execution is the new interface.","why":"反直觉但越来越像事实：下一代 AI 产品的核心竞争点，不是 prompt UX，而是受约束的 planning、tool use、error recovery 和 runtime context。","url":"https://github.blog/ai-and-ml/github-copilot/the-era-of-ai-as-text-is-over-execution-is-the-new-interface/"},{"id":"20260313-3","category":"must","title":"Major agentic capabilities improvements in GitHub Copilot for JetBrains IDEs","why":"一个很硬的 builder 信号：sub-agents、plan agent、hooks、MCP auto-approve 一起进场，说明 IDE 内的 agent orchestration 正在从演示态进入日常生产流。","url":"https://github.blog/changelog/2026-03-11-major-agentic-capabilities-improvements-in-github-copilot-for-jetbrains-ides/"},{"id":"20260313-4","category":"worth","title":"OpenAI plans to launch its Sora video tool in ChatGPT, The Information reports | Reuters","why":"多模态真正的爆发点，可能不是独立视频产品，而是直接塞回默认聊天入口；分发层一旦统一，用户教育成本会骤降。","url":"https://www.reuters.com/business/openai-plans-launch-its-sora-video-tool-chatgpt-information-reports-2026-03-11/"},{"id":"20260313-5","category":"worth","title":"Request Copilot code review from GitHub CLI","why":"小改动但很值钱：AI reviewer 从浏览器侧窗，变成终端里的默认动作；真正决定 adoption 的，常常不是更强模型，而是少一次上下文切换。","url":"https://github.blog/changelog/2026-03-11-request-copilot-code-review-from-github-cli/"},{"id":"20260313-6","category":"worth","title":"Continuous AI for accessibility: How GitHub transforms feedback into inclusion","why":"一个可直接抄的 agent workflow：AI 不必替代工程师，只要先把混乱的人类反馈变成结构化、可追踪、可交接的问题单，ROI 就已经成立。","url":"https://github.blog/ai-and-ml/github-copilot/continuous-ai-for-accessibility-how-github-transforms-feedback-into-inclusion/"},{"id":"20260313-7","category":"wild","title":"Fujitsu Hallucination Benchmark: diagnosing when language priors override visual evidence","why":"很反直觉：更强的语言模型不一定是更好的多模态见证人；当文本先验压过视觉证据，模型会"看见"它以为该出现的东西。","url":"https://blog-en.fltech.dev/entry/2026/03/11/fujitsu-hallucination-benchmark-en"}]},

            {date:"2026-03-12",items:[{"id":"20260312-1","category":"must","title":"Many agents, one team: Scaling modernization on Azure","why":"一个很强的 builder 信号：Agent 不该只做单点 Copilot，而要直接接入 discovery→assessment→planning→migration→code transformation 的整条流水线。","url":"https://azure.microsoft.com/en-us/blog/many-agents-one-team-scaling-modernization-on-azure/"},{"id":"20260312-2","category":"must","title":"The era of AI as text is over. Execution is the new interface.","why":"反直觉但基本属实：下一代 AI 产品的核心不再是 prompt UX，而是把 planning、tool use、error recovery 和约束执行嵌进应用本身。","url":"https://github.blog/ai-and-ml/github-copilot/the-era-of-ai-as-text-is-over-execution-is-the-new-interface/"},{"id":"20260312-3","category":"must","title":"Reading, Not Thinking: Understanding and Bridging the Modality Gap When Text Becomes Pixels in Multimodal LLMs","why":"多模态里真正掉点的常常不是 reasoning，而是 reading；先修 OCR/排版/分辨率链路，可能比继续堆推理 token 更有效。","url":"https://arxiv.org/abs/2603.09095"},{"id":"20260312-4","category":"worth","title":"Major agentic capabilities improvements in GitHub Copilot for JetBrains IDEs","why":"很 builder：custom agents、sub-agents、plan agent GA，hooks + MCP auto-approve 进场，说明 IDE 内的 agent orchestration 正在产品化。","url":"https://github.blog/changelog/2026-03-11-major-agentic-capabilities-improvements-in-github-copilot-for-jetbrains-ides/"},{"id":"20260312-5","category":"worth","title":"UiPath Reports Fourth Quarter and Full Year Fiscal 2026 Financial Results","why":"一个商业侧硬信号：企业愿意为“deterministic automation + agentic AI + orchestration”买单，execution layer 正在从概念变预算。","url":"https://ir.uipath.com/news/detail/431/uipath-reports-fourth-quarter-and-full-year-fiscal-2026-financial-results"},{"id":"20260312-6","category":"worth","title":"Talk Freely, Execute Strictly: Schema-Gated Agentic AI for Flexible and Reproducible Scientific Workflows","why":"一个值得抄的底层原则：自然语言负责表达意图，但执行权必须被 schema gate 住；否则灵活性会吞掉可复现性。","url":"https://arxiv.org/abs/2603.06394"},{"id":"20260312-7","category":"wild","title":"EXPLORE-Bench: Egocentric Scene Prediction with Long-Horizon Reasoning","why":"给 embodied / multimodal builder 的冷水：模型能看懂当前画面，不等于能稳定预测一串动作后的世界状态；长程物理推演还是硬缺口。","url":"https://arxiv.org/abs/2603.09731"}]},
            {date:"2026-03-11",items:[{"id":"20260311-1","category":"must","title":"Under the hood: Security architecture of GitHub Agentic Workflows","why":"反直觉但很对：别先把 Agent 当“聪明同事”，先把它当不可信 CI job；隔离、约束输出、全量日志，才是能规模化上线的起点。","url":"https://github.blog/ai-and-ml/generative-ai/under-the-hood-security-architecture-of-github-agentic-workflows/"},{"id":"20260311-2","category":"must","title":"Secure agentic AI for your Frontier Transformation","why":"企业真正缺的不是更多 Agent，而是 control plane；先把 registry、identity、risk signal、DLP 做起来，AI 才能进生产环境。","url":"https://www.microsoft.com/en-us/security/blog/2026/03/09/secure-agentic-ai-for-your-frontier-transformation/"},{"id":"20260311-3","category":"must","title":"AI Agents, Language, Deep Learning and the Next Revolution in Science","why":"科研 Agent 给企业一个硬启发：真正可复用的不是 prompt，而是带 traceability 的 DSL + human oversight。","url":"https://arxiv.org/abs/2603.07940"},{"id":"20260311-4","category":"worth","title":"Copilot Cowork: A new way of getting work done","why":"Agent 产品形态在收敛：不是更会聊，而是能把计划丢进后台持续执行，并且随时 checkpoint、可暂停、可审计。","url":"https://www.microsoft.com/en-us/microsoft-365/blog/2026/03/09/copilot-cowork-a-new-way-of-getting-work-done/"},{"id":"20260311-5","category":"worth","title":"SaiVLA-0: Cerebrum–Pons–Cerebellum Tripartite Architecture for Compute-Aware Vision-Language-Action","why":"反直觉：把大模型主体冻结，只重训适配层和执行层，往往更快、更便宜，也更容易迁移到新机器人/新场景。","url":"https://arxiv.org/abs/2603.08124"},{"id":"20260311-6","category":"worth","title":"Talk Freely, Execute Strictly: Schema-Gated Agentic AI for Flexible and Reproducible Scientific Workflows","why":"一个值得抄的架构原则：自然语言负责表达意图，但执行权必须被 schema gate 住；否则灵活性会直接吃掉可复现性。","url":"https://arxiv.org/abs/2603.06394"},{"id":"20260311-7","category":"wild","title":"Mandiant’s founder just raised $190M for his autonomous AI agent security startup","why":"资本在下注一个现实判断：AI on offense 会先到，所以“agent 守 agent”很可能会比通用安全 Copilot 更早形成刚需市场。","url":"https://techcrunch.com/2026/03/10/mandiants-founder-just-raised-190m-for-his-autonomous-ai-agent-security-startup/"},{"id":"20260311-8","category":"wild","title":"CoCo: Code as CoT for Text-to-Image Preview and Rare Concept Generation","why":"多模态生成也许该先“写代码出草图”再精修，而不是直接让模型一次性幻想到位；可控性会高很多。","url":"https://arxiv.org/abs/2603.08652"}]},

-microvms-introducing-bunkervm-1ma8"},{id:"20260310-8",category:"wild",title:"Arm at Embedded World 2026: Powering intelligent edge AI systems at scale",why:"一个被低估的方向：分布式 Agent 可能先在边缘设备跑起来，而不是全都回云端；真正难点是可复用 runtime 和可预测实时性。",url:"https://newsroom.arm.com/blog/arm-embedded-world-2026"},{id:"20260310-9",category:"wild",title:"Grok Build: Agent That Runs 8 Parallel AI Agents to Plan, Search, and Build",why:"反直觉：下一个效率跃迁也许不是单个更强 coding model，而是并行 Agent + 自动 ranking；开发者更像是在挑最好的一版。",url:"https://www.adwaitx.com/grok-build-vibe-coding-cli-agent/"}]},

                    {id: "20260305-3", category: "must", title: "VSearcher: Long-Horizon Multimodal Search Agent via Reinforcement Learning", why: "用 SFT→RL 把静态多模态模型训练成能做文本/图像搜索+网页浏览的长程工具调用代理，并提出更难的 multimodal search 评测。对 builder 的启示：想要稳定的多步检索/浏览 agent，可能需要 RL 而不是更长的 prompt。", url: "https://arxiv.org/abs/2603.02795"},

        let currentTier = 'all';
        let searchTerm = '';
        
        function renderBriefs() {
            const list = document.getElementById('briefList');
            
            if (BRIEFS.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>暂无简报数据</p><p style="font-size: 0.9rem; margin-top: 0.5rem;">等待第一次 Daily Brief 生成...</p></div>';
                return;
            }
            
            list.innerHTML = BRIEFS.map(brief => {
                const items = brief.items || [];
                const filteredItems = items.filter(item => {
                    if (currentTier !== 'all' && item.category !== currentTier) return false;
                    if (searchTerm) {
                        const text = (item.title + ' ' + item.why).toLowerCase();
                        return text.includes(searchTerm.toLowerCase());
                    }
                    return true;
                });
                
                if (filteredItems.length === 0) return '';
                
                const mustItems = filteredItems.filter(i => i.category === 'must');
                const worthItems = filteredItems.filter(i => i.category === 'worth');
                const wildItems = filteredItems.filter(i => i.category === 'wild');
                
                return `
                    <div class="brief-card">
                        <div class="brief-header">
                            <span class="brief-date">${brief.date}</span>
                            <span class="brief-count">${filteredItems.length} 条</span>
                        </div>
                        <div class="brief-content">
                            ${mustItems.length > 0 ? `
                                <div class="tier">
                                    <div class="tier-header tier-must">MUST READ</div>
                                    <div class="item-list">
                                        ${mustItems.map(item => renderItem(item)).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            ${worthItems.length > 0 ? `
                                <div class="tier">
                                    <div class="tier-header tier-worth">WORTH A LOOK</div>
                                    <div class="item-list">
                                        ${worthItems.map(item => renderItem(item)).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            ${wildItems.length > 0 ? `
                                <div class="tier">
                                    <div class="tier-header tier-wild">WILDCARD</div>
                                    <div class="item-list">
                                        ${wildItems.map(item => renderItem(item)).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).filter(Boolean).join('');
        }
        
        function renderItem(item) {
            return `
                <div class="item">
                    <div class="item-title">${escapeHtml(item.title)}</div>
                    <div class="item-why">${escapeHtml(item.why)}</div>
                    <a class="item-url" href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.url)}</a>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function filterByTier(tier) {
            currentTier = tier;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBriefs();
        }
        
        function filterBriefs() {
            searchTerm = document.getElementById('searchInput').value;
            renderBriefs();
        }
        
        renderBriefs();
    </script>
